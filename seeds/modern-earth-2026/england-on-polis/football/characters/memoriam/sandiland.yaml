#
# Tomas was a Hartwell academy product who collapsed during a Combination
# Cup tie at Eastfen in October 2018 from undiagnosed cardiomyopathy. He
# was 22. The Sandiland Stand at Brackensley Park is named for him; the
# club holds an annual memorial fixture. His memory shapes Marsh-Bennett's
# captaincy posture (the "no leaks ever" standing order traces in part to
# how the family asked the club to handle the press in the days after).
#
# This character is referenced in narrative content and supporter culture
# but has cycle_state: deceased and runs no CharacterLifeWorkflow.

