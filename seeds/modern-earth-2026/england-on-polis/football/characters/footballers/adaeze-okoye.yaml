  ambitions:
    - "captaincy at Hartwell within two seasons"
    - "transfer to top tier on her terms, not under pressure"
    - "support Chuka through engineering degree"
  backstory:
    - >-
      Adaeze grew up in Enugu, the second of four children, in a household
      where her mother was the headteacher of a state primary school and her
      father ran a small printing press that mostly made wedding programmes
      and church bulletins. Football was tolerated, not encouraged. She
      played in a girls' side that practised at six in the morning before
      school because the boys had the pitch the rest of the day.
    - >-
      She left for Sheffield in 2022 on a scholarship at a women's-football
      academy that turned out, six months in, to be running on fumes. Two of
      the coaches walked. She nearly went home. The reason she didn't was a
      Yorkshire physio named Mary Ogunlesi who told her, in a sentence Adaeze
      still quotes, that going home would be a decision she'd defend for the
      rest of her life and she'd rather defend a different one.
    - >-
      She arrived at Hartwell in summer 2024 from a part-time contract in
      Tier 4. The manager who signed her was sacked nine games later. She has
      now had three managers in two seasons. She does not mention this in
      interviews, but she keeps a list, on a folded sheet of paper inside the
      back of her training diary, of every promise each of them made her.
    - >-
      She sends roughly a quarter of her wages to her younger brother Chuka,
      who is finishing his second year of a mechanical-engineering degree in
      Lagos. She has never told the club this. She does not consider it
      relevant to football, and she would consider it embarrassing to be asked.

