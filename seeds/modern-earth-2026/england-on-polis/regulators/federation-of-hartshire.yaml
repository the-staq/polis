identity:
  name: Federation of Hartshire
  short_name: FoH
  founding_year_in_world: 1872
  headquarters_lot_id: lot_foxbridge_governance_district_foh-house
  motto: A fair contest, fairly judged
  narrative_brief: >
    England-on-Polis's football governing body. Sanctions all four pyramid
    tiers (Premiership / Championship / Combination / Counties), runs the
    Foxbridge Cup, certifies coaches and agents, appoints referees, and
    rules on disciplinary matters. Reports politically to the Sport Minister
    (c_sport_minister) but operates with substantial independence from
    direct government interference.

