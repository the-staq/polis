governance:
  auto_decide_rules:
    - { decision_type: routine_correspondence, action: auto_decide }
    - { decision_type: scheduling, action: auto_decide }
    - { decision_type: ceremonial_appearance, action: auto_decide }
  ping_rules:
    # PMs don't have player principals at V0 (NPC); these rules become
    # active if/when a V1+ user spawns into PM office via election outcome.
    - { decision_type: cabinet_appointment, urgency_window: 7d }
    - { decision_type: war_declaration, urgency_window: 24h }
    - { decision_type: emergency_legislation, urgency_window: 24h }
    - { decision_type: dissolution_of_parliament, urgency_window: 7d }
  standing_orders:
    - "no statement on a sitting judicial matter"
    - "Treasury sees every cabinet paper before it lands on my desk"
    - "ministers who leak get one warning"

