      cabinet_discipline: 84
      treasury_intuition: 78
      foreign_relations: 71
      media_savvy: 62
      crisis_response: 80
    experience_years: 18
    current_institution_id: hm-government-foxbridge
    career_level: 5
    certifications_held: []

