  - { target_id: c_cabinet_secretary, target_type: character, relation: confidante, strength: 0.91, since_in_world: "2018-04-15" }
  - { target_id: c_lord_chief_justice, target_type: character, relation: cordial_distance, strength: 0.42, since_in_world: "2024-06-01" }
