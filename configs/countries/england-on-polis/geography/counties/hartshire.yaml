  established_in_world: 1086
  narrative_brief: >
    Inland county in central England-on-Polis. Mixed agricultural and
    light-industrial economy; the highest density of football-playing
    towns per square mile in the country. Twelve clubs in the Hartshire
    Combination tier-3 league; the rivalry between Hartwell and Saltbury
    United is the county's most-watched derby.

