# Foxbridge — capital region county
# Holds Foxbridge-on-Tyne (capital city), national-government institutions,
# Bank of Foxbridge, Inland Revenue Foxbridge, the Supreme Court, and
# most regulators.

id: foxbridge
country: england-on-polis
world: modern-earth-2026
type: county
parent_subdivision_id: null

identity:
  name: Foxbridge (capital region)
  short_name: FOX
  motto: Caput regni
  established_in_world: 927
  flag: ipfs://Qm.../foxbridge-county-flag.svg
  narrative_brief: >
    Capital region. Houses the seat of national government, the Supreme
    Court, the central bank, the principal regulators, and the Federation
    of Hartshire (which sits in Foxbridge despite the football pyramid
    centring on Hartshire). Densely urban; service-economy dominant;
    reform-oriented voting.

geography:
  area_km2: 1620
  population: 2_780_000
  capital_town_id: lot_foxbridge_foxbridge-on-tyne
