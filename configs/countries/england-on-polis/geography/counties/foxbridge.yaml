  council_institution_id: foxbridge-city-council
  council_seats: 95
  electoral_basis: divisions_first_past_the_post
  current_leader_character_id: null

  has_own_taxation: true   # capital-region exception per Constitution Article VI §2
  council_tax_authority: true
  treasury_recipient_institution_id: foxbridge-city-council

  cabinet_committees:
    - { id: planning, scope: capital region planning and conservation }
    - { id: transit, scope: foxbridge metro and bus network }
    - { id: housing, scope: capital-region affordable housing }
    - { id: business, scope: financial-district policy and tourism }

  notes:
    - Foxbridge is the only county at V0 with own-taxation authority.
      Other counties lack independent tax-levy power.
    - Council tax revenue is bounded by national framework via the
      Treasury Minister; council overrides require local referendum.

