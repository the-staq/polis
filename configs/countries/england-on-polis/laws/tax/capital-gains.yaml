# Foxbridge Capital Gains Tax — schedule

capital_gains_tax:
  currency: POL
  fiscal_year_start: "2026-04-06"
  jurisdiction: england-on-polis
  authority: inland-revenue-foxbridge

  basis: net_capital_gain_after_annual_exempt_amount
  headline_rate: 0.25                # individuals (higher rate band)
  basic_rate_taxpayer_rate: 0.18     # individuals (basic rate band)
  residential_property_rate: 0.28    # secondary-home disposals
  business_asset_disposal_relief_rate: 0.10
  business_asset_disposal_relief_lifetime_limit_pol: 1_000_000
  annual_exempt_amount_pol: 12300

  exemptions:
    principal_private_residence: true
    sole_main_home: true
    isa_isf_equivalent_savings_vehicles: true
    interspousal_transfers: true
    charity_donations: true
    digital_substrate_in_kind_pol_balance_movement: not_a_cgt_event

  rollover_holdover_relief:
    business_asset_rollover_into_qualifying_replacement: true
    holdover_for_gifts_of_business_assets: true
    incorporation_relief_into_company_in_exchange_for_shares: true

  losses:
    capital_losses_offset_against_capital_gains_only: true
    carry_forward_indefinite: true
    no_offset_against_income: true

  football_specific:
    player_registration_disposal_by_club: corporate_tax_basis_not_cgt
    sale_of_individual_player_personal_assets_by_player: standard_cgt
    sale_of_image_rights_company_shares: standard_cgt_subject_to_recharacterisation_anti_avoidance

  filing:
    self_assessment_required_above_proceeds_pol: 49200
    deadline: same_as_self_assessment_per_income_tax

