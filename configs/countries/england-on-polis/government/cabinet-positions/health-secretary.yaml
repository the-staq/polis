# Health Secretary — cabinet position SLOT
# Constitutional basis: Article II §2.
# V0: incumbent slot empty.

position_id: health-secretary
title: Health Secretary
title_short: SoS Health and Care
ministry: Department of Health and Social Care, Foxbridge
ministry_id: dept-of-health-foxbridge

appointment:
  by: prime_minister
  must_be_member_of_parliament: true
  oath_required: true

portfolio:
  primary_responsibilities:
    - public_health_at_country_level
    - foxbridge_national_health_service_oversight
    - pharmaceutical_regulation_via_medicines_regulator
    - communicable_disease_response
    - mental_health_policy
    - social_care_with_local_authorities
  liaisons:
    - foxbridge_anti_doping_authority   # shared with Sport Minister
    - foxbridge_health_and_safety_executive   # via Labour Minister
    - foxbridge_information_commissioner   # patient data

powers:
  - propose_health_legislation
  - lay_pharmaceutical_regulation
  - direct_fnhs_strategy_subject_to_clinical_independence
  - declare_public_health_emergency
  - chair_pandemic_preparedness_cabinet_committee

constraints:
  - cannot_override_clinical_judgment_in_individual_cases
  - cannot_override_engine_hard_floors_health_data_csam
  - cannot_compel_individual_medical_treatment_outside_law

accountability:
  to_parliament_via: health_select_committee
  reporting_cadence: annual_plus_quarterly_fnhs

compensation:
  base_salary_pol_per_month: 14000

current_incumbent_seed: null   # V0: vacant

provenance:
  authored_by: the staq
  license: CC-BY-4.0
  schema_version: "0.1.0"
