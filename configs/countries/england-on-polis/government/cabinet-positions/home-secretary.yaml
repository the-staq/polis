# Home Secretary — cabinet position SLOT
# Constitutional basis: Article II §2.
# V0: incumbent slot empty (current_incumbent_character_id: null in country.yaml).

position_id: home-secretary
title: Home Secretary
title_short: SoS Home Affairs
ministry: Home Office, Foxbridge
ministry_id: home-office-foxbridge

appointment:
  by: prime_minister
  must_be_member_of_parliament: true
  oath_required: true

portfolio:
  primary_responsibilities:
    - internal_security_and_policing
    - immigration_and_border_control
    - citizenship_and_naturalisation_administration
    - counter_terrorism_policy_at_executive_level
    - national_identity_documents_passport_office
    - prevention_of_domestic_extremism
  liaisons:
    - police_forces_county_level
    - intelligence_and_security_pm_oversight
    - foxbridge_gambling_commission_via_pm
    - foxbridge_information_commissioner

powers:
  - propose_immigration_legislation
  - issue_visa_categories_per_laws_immigration
  - direct_borders_authority
  - lay_immigration_regulations
  - propose_counter-terrorism_legislation_subject_to_constitutional_scrutiny

constraints:
  - cannot_strip_citizenship_unilaterally   # Article VII §3 judicial ruling required
  - cannot_override_article_iv_rights
  - cannot_block_emigration   # Article IV §6 freedom of movement; engine refuses
  - cannot_intervene_in_individual_police_operational_decisions

accountability:
  to_parliament_via: home_affairs_select_committee
  reporting_cadence: annual_plus_emergency_supplementary

compensation:
  base_salary_pol_per_month: 14000

current_incumbent_seed: null   # V0: vacant; assigned at V1+ when home-affairs caseload arrives

provenance:
  authored_by: the staq
  license: CC-BY-4.0
  schema_version: "0.1.0"
