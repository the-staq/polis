# Foreign Secretary — cabinet position SLOT
# Constitutional basis: Article II §2; Article VIII (foreign relations).

position_id: foreign-secretary
title: Foreign Secretary
title_short: SoS Foreign Affairs
ministry: Foreign and Commonwealth Office, Foxbridge
ministry_id: foreign-office-foxbridge

appointment:
  by: prime_minister
  must_be_member_of_parliament: true
  oath_required: true

portfolio:
  primary_responsibilities:
    - foreign_relations_at_state_level
    - treaty_negotiation_and_ratification_pipeline
    - country_recognition_recommendation_to_cabinet
    - diplomatic_corps_management
    - sanctions_administration_with_treasury_and_home
    - consular_services_for_citizens_abroad
  v0_dormancy:
    - empty_portfolio_at_v0   # only one country in world
    - sanctions_compliance_defaults_to_engine_layer_ofac_un_eu_floor

powers:
  - sign_treaties_subject_to_parliamentary_ratification
  - issue_recognition_recommendations_per_country.yaml.foreign_policy
  - direct_diplomatic_corps
  - propose_sanctions_designations_to_cabinet
  - manage_diplomatic_immunity_v1_plus

constraints:
  - cannot_override_engine_hard_floor_sanctions_compliance
  - cannot_override_article_iv_rights_via_treaty
  - cannot_recognise_country_via_treaty_alone   # cabinet decision per Article VIII

accountability:
  to_parliament_via: foreign_affairs_select_committee
  reporting_cadence: quarterly_plus_treaty_pipeline

compensation:
  base_salary_pol_per_month: 14000

current_incumbent_seed: ../../../seeds/modern-earth-2026/england-on-polis/government/cabinet/foreign-secretary.yaml

provenance:
  authored_by: the staq
  license: CC-BY-4.0
  schema_version: "0.1.0"
