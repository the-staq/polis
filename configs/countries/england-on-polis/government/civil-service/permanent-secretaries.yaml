# Permanent secretaries of England-on-Polis
# Senior civil servants who head ministries and serve successive governments.
# Slots only — incumbents are seeded under
# polis/seeds/modern-earth-2026/england-on-polis/government/.

permanent_secretary_corps:
  governing_principle: politically_neutral_professional_continuity
  appointment_authority: cabinet_secretary_with_civil_service_commission
  term: until_retirement_or_reassignment
  removal_grounds: gross_misconduct_or_capability_via_civil_service_commission

positions:

  - position_id: cabinet-secretary
    title: Cabinet Secretary
    ministry: Cabinet Office
    ministry_id: cabinet-office-foxbridge
    role_summary: >
      Head of the civil service. Convenes Cabinet, prepares the agenda,
      records decisions, ensures collective-government discipline,
      coordinates cross-ministry policy.
    primary_duties:
      - convene_and_record_cabinet
      - coordinate_inter_ministerial_policy
      - lead_civil_service_appointments
      - maintain_propriety_and_ethics_in_public_administration
      - serve_successive_governments_with_political_neutrality
    reports_to: prime_minister
    current_incumbent_seed: ../../../seeds/modern-earth-2026/england-on-polis/government/cabinet-secretary.yaml

  - position_id: perm-sec-treasury
    title: Permanent Secretary to HM Treasury
    ministry: HM Treasury, Foxbridge
    ministry_id: hm-treasury-foxbridge
    role_summary: >
      Senior civil servant in the Treasury. Accountable for the
      department's accounts, policy advice to the Treasury Minister,
      management of treasury staff.
    primary_duties:
      - accounting_officer_for_hm_treasury
      - principal_policy_advisor_to_treasury_minister
      - manage_treasury_civil_service_staff
      - maintain_continuity_across_governments
    reports_to: cabinet-secretary_administrative
    reports_to_political: treasury-minister
    current_incumbent_seed: null

  - position_id: perm-sec-justice
    title: Permanent Secretary to Justice
    ministry: Ministry of Justice, Foxbridge
    ministry_id: ministry-of-justice-foxbridge
    role_summary: >
      Senior civil servant in Justice. Accountable for prison and
      tribunal estate, judicial appointments secretariat, civil-service
      independence on legal matters.
    primary_duties:
      - accounting_officer_for_ministry_of_justice
      - principal_policy_advisor_to_justice_minister
      - secretariat_for_judicial_appointments
      - manage_justice_civil_service_staff
    reports_to: cabinet-secretary_administrative
    reports_to_political: justice-minister
    current_incumbent_seed: null

  - position_id: perm-sec-foreign-office
    title: Permanent Secretary to the Foreign Office
    ministry: Foreign and Commonwealth Office, Foxbridge
    ministry_id: foreign-office-foxbridge
    role_summary: >
      Senior civil servant in foreign affairs. Manages the diplomatic
      corps, advises the Foreign Secretary, maintains continuity
      across governments on long-cycle treaty work.
    primary_duties:
      - accounting_officer_for_foreign_office
      - principal_policy_advisor_to_foreign_secretary
      - head_of_diplomatic_service
    reports_to: cabinet-secretary_administrative
    reports_to_political: foreign-secretary
    current_incumbent_seed: null

  - position_id: perm-sec-sport
    title: Permanent Secretary for Sport
    ministry: Department for Sport, Broadcasting, and Integrity
    ministry_id: dept-of-sport-foxbridge
    role_summary: >
      Senior civil servant in Sport. Liaison with Federation of
      Hartshire (operationally independent), broadcasting policy,
      anti-doping authority oversight.
    primary_duties:
      - accounting_officer_for_dept_of_sport
      - principal_policy_advisor_to_sport_minister
      - liaison_with_federation_of_hartshire
    reports_to: cabinet-secretary_administrative
    reports_to_political: sport-minister
    current_incumbent_seed: null

  - position_id: perm-sec-labour
    title: Permanent Secretary for Labour
    ministry: Department for Labour, Pensions, and Industrial Relations
    ministry_id: dept-of-labour-foxbridge
    role_summary: >
      Senior civil servant in Labour. Employment-tribunal liaison,
      minimum-wage administration, industrial-relations strategy.
    primary_duties:
      - accounting_officer_for_dept_of_labour
      - principal_policy_advisor_to_labour_minister
      - public_register_of_underpaying_employers
    reports_to: cabinet-secretary_administrative
    reports_to_political: labour-minister
    current_incumbent_seed: null

  - position_id: perm-sec-home
    title: Permanent Secretary to the Home Office
    ministry: Home Office, Foxbridge
    ministry_id: home-office-foxbridge
    role_summary: >
      Senior civil servant in Home Affairs. Immigration administration,
      policing liaison, citizenship registry.
    reports_to: cabinet-secretary_administrative
    reports_to_political: home-secretary
    current_incumbent_seed: null

  - position_id: perm-sec-health
    title: Permanent Secretary for Health
    ministry: Department of Health and Social Care
    ministry_id: dept-of-health-foxbridge
    role_summary: >
      Senior civil servant in Health. FNHS oversight, public-health
      regulation, pharmaceutical-regulator liaison.
    reports_to: cabinet-secretary_administrative
    reports_to_political: health-secretary
    current_incumbent_seed: null

operating_rules:
  - permanent_secretaries_serve_successive_governments
  - politically_neutral_in_public_communication
  - confidential_advice_to_ministers_protected
  - no_party_political_donations
  - resignation_required_to_seek_elected_office
  - accounting_officer_responsibility_personal_under_audit

