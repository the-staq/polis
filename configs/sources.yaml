# Polis — Source provenance and license tracking
#
# Every public-domain or open-license source ingested into Polis corpora is
# tracked here. Per V0-PLAN R13 (corpus copyright/licensing exposure), this
# file is the project's legal-defensibility audit trail.
#
# Format per source:
#   id:                       (slug, unique)
#   title:                    (human-readable)
#   url:                      (canonical source URL)
#   license:                  (SPDX identifier or named license)
#   attribution:              (text required by license)
#   used_in:                  (list of polis/configs/ paths consuming this source)
#   adapted_to:               (single polis/configs/ path if 1:1 adaptation)
#   adaptation_notes:         (what was changed; what was preserved)
#   ingestion_date:           (YYYY-MM-DD)
#   chunk_count:              (after embedding; TBD until ingested)
#   embedding_model:          (per-corpus pinning; voyage-3 default)
#   license_review_status:    (pending | cleared | escalated | refused)
#   license_review_at:        (YYYY-MM-DD when last reviewed)
#   license_review_by:        (founder | legal-counsel | tbd)
#
# This is the V0 starter set. Expand as corpora ingestion progresses per
# FOUNDATION-PLAN.md.

sources: []

