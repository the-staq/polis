  founding_year_in_world: 2022
  headquarters_lot_id: lot_ravensby_harbourside_fishers-court
  motto: Cold gym, hot hands
  narrative_brief: >
    Coastal-town club, four years old, no silverware yet. Plays out of a
    converted fish-market hall on the harbour. Lower-budget than the
    Titans by half. Reputation: a clean defensive identity, two starters
    poached from Tier 2 clubs. Ravensby has its football side too
    (Ravensby Athletic in the football industry); the two clubs share
    the town but otherwise have nothing in common.

